spring.application.name=trixi

# Default: Use H2 in-memory DB (file-based for local persistence)
#spring.datasource.url=jdbc:h2:./trixidb;DB_CLOSE_DELAY=-1;MODE=MySQL
#spring.datasource.username=sa
#spring.datasource.password=

# MySQL connection settings
spring.datasource.url=jdbc:mysql://localhost:3306/trixi_db?characterEncoding=utf8
spring.datasource.username=trixi_user
spring.datasource.password=trixi_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# jOOQ settings
spring.jooq.sql-dialect=mysql

# Schema generation
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# To use MySQL with Docker, run: docker-compose up
# The 'mysql' profile is pre-configured in docker-compose.yml
